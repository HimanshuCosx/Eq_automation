[pytest]
# Run tests sequentially in a single process so the session-scoped, already
# logged-in `page` fixture (see conftest.py) is shared across all tests.
#
# Reports generated automatically on every run:
#   * reports/report.html   -> single self-contained HTML file (email to manager)
#   * allure-results/        -> raw results for the Allure dashboard
addopts =
    -v
    -ra
    --html=reports/report.html
    --self-contained-html
    --alluredir=allure-results

# --- Logging: captured per-test and shown in the HTML report ---------------- #
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_level = INFO
log_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
log_file = reports/pytest.log
log_file_level = INFO

markers =
    smoke: smoke test cases
    trading: trading test cases
    rande: retail and ecommerse
    mob: mobile app and devlopment
    ai: ai tab
